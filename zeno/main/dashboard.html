<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css" />
    <link rel="stylesheet" href="/style.css" /> 
    <link rel="stylesheet" href="/dashboard.css" /> 
    <title>Zeno - Public & Private Dashboard</title>
</head>
<body>
    <header class="main-header">
        <div class="logo">ZENO</div>
        <nav class="main-nav">
          <a href="/index.html">HOME</a>
          <a href="/home/index.html">MY WORKSPACE</a>
          <a href="#" id="authLink">SIGN IN</a>
        </nav>
    </header>

    <main class="dashboard-layout">
        <aside class="sidebar">
            <button class="tab-btn active" data-tab="public-feed"><i class="fa-solid fa-globe"></i> Public Feed</button>
            <button class="tab-btn" data-tab="my-projects"><i class="fa-solid fa-folder"></i> My Projects</button>
        </aside>

        <section class="content-area">
            
            <div id="public-feed" class="tab-pane active">
                <h2>Explore Projects</h2>
                <div id="publicGrid" class="projects-grid">
                    <!-- Dynamic Projects go here -->
                </div>
            </div>

            <div id="my-projects" class="tab-pane hidden">
                <h2>Manage Your Deployments</h2>
                <p id="authMessage">Loading...</p>
                <div id="privateGrid" class="projects-grid">
                     <!-- Dynamic own projects go here -->
                </div>
            </div>

        </section>
    </main>

    <!-- Modal for Editing Code -->
    <div id="editModal" class="modal hidden">
        <div class="modal-content">
            <span class="close-btn" id="closeModal">&times;</span>
            <h2 id="modalTitle">Editing File</h2>
            <div class="file-selector" id="editFileSelector">
                <!-- Dropdown for selecting which file in the project to edit -->
            </div>
            <textarea id="codeEditor" spellcheck="false"></textarea>
            <button id="saveEditBtn" class="btn btn-primary">Save Changes</button>
        </div>
    </div>

    <script type="module" src="/dashboard.js"></script>
</body>
</html>
