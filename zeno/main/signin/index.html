<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
    />
    <link rel="stylesheet" href="/signin/style.css" />
    <title>Modern Login Page</title>
  </head>
  <body>
    <div class="signup-logo">
      <img src="/logo.png" alt="Zeno logo" />
    </div>
    <a href="/index.html" class="back-link">← Back to home</a>
    <div class="container" id="container">
      <div class="form-container sign-up">
        <form id="registerForm">
          <h1>Create Account</h1>
          <div class="social-icons">
            <button id="registerGoogle" class="icon" type="button" aria-label="Sign up with Google">
              <i class="fa-brands fa-google"></i>
            </button>
            <a href="https://github.com/moizali125" class="icon">
              <i class="fa-brands fa-github"></i>
            </a>
          </div>
          <span>or use your email for registration</span>
          <input id="registerName" type="text" placeholder="Name" required />
          <input id="registerEmail" type="email" placeholder="Email" required />
          <input id="registerPassword" type="password" placeholder="Password" required />
          <button type="submit">Sign Up</button>
        </form>
      </div>
      <div class="form-container sign-in">
        <form id="signinForm">
          <h1>Sign In</h1>
          <div class="social-icons">
            <button id="signinGoogle" class="icon" type="button" aria-label="Sign in with Google">
              <i class="fa-brands fa-google"></i>
            </button>
            <a href="https://github.com/moizali125" class="icon">
              <i class="fa-brands fa-github"></i>
            </a>
          </div>
          <span>or use your email and password</span>
          <input id="signinEmail" type="email" placeholder="Email" required />
          <input id="signinPassword" type="password" placeholder="Password" required />
          <a href="#">Forgot your password?</a>
          <button type="submit">Sign In</button>
        </form>
      </div>
      <div class="toggle-container">
        <div class="toggle">
          <div class="toggle-panel toggle-left">
            <h1>Welcome Back!</h1>
            <p>sign in to use our ZENO application</p>
            <button class="hidden" id="login">Sign In</button>
          </div>
          <div class="toggle-panel toggle-right">
            <h1>Hello!!</h1>
            <p>
              sign in to use our ZENO application
            </p>
            <button class="hidden" id="register">Sign Up</button>
          </div>
        </div>
      </div>
    </div>

    <script type="module" src="/signin/script.js"></script>
  </body>
</html>
